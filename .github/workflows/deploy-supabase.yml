name: Deploy Supabase

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Login to Supabase CLI (via npx)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase@latest login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Deploy Supabase functions (via npx)
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase@latest functions deploy --project-ref "$SUPABASE_PROJECT_REF" || true
        working-directory: clean_workflow/supabase

      - name: Push DB schema (optional, via npx)
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase@latest db push --project-ref "$SUPABASE_PROJECT_REF" || true
        working-directory: clean_workflow/supabase
